# Cole este arquivo em .github/workflows/ci.yml do seu repo Node/TypeScript.
# Auto-detecta pnpm/npm/bun pelo lockfile. Atualiza no actions-templates → propaga.
#
# Fluxo de portões: PR pra `dev` (relaxado) → `staging` (estrito) → `main` (prod gate + E2E).
# Repo só com `main` continua funcionando — basta usar PR pra main.

name: CI

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main, staging, dev]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  ci:
    uses: andreroederdelima-lang/actions-templates/.github/workflows/node-ci.yml@main
    with:
      node-version: '22'
      package-manager: 'auto'
      # Strict só quando promovendo pra staging ou main
      tests-strict: ${{ github.base_ref == 'staging' || github.base_ref == 'main' }}
      format-strict: ${{ github.base_ref == 'main' }}

  security:
    uses: andreroederdelima-lang/actions-templates/.github/workflows/security.yml@main
    with:
      # PR pra main = audit mais agressivo (low). PR pra staging/dev = high.
      audit-level: ${{ github.base_ref == 'main' && 'low' || 'high' }}
      codeql-language: 'javascript-typescript'

  # Gate prod: roda E2E (Playwright) e smoke test só quando promovendo pra main
  e2e:
    if: github.base_ref == 'main' && github.event_name == 'pull_request'
    uses: andreroederdelima-lang/actions-templates/.github/workflows/e2e.yml@main
    with:
      node-version: '22'
      package-manager: 'auto'
      # target-url: 'https://staging.<projeto>.com'  # opcional, configure por repo