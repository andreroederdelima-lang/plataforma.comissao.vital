# Cole este arquivo em .github/workflows/ci.yml do seu repo Node/TypeScript.
# Auto-detecta pnpm/npm/bun pelo lockfile. Atualiza no actions-templates → propaga.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  ci:
    uses: andreroederdelima-lang/actions-templates/.github/workflows/node-ci.yml@main
    with:
      node-version: '22'
      package-manager: 'auto'
      tests-strict: false
      format-strict: false

  security:
    uses: andreroederdelima-lang/actions-templates/.github/workflows/security.yml@main
    with:
      audit-level: 'high'
      codeql-language: 'javascript-typescript'
